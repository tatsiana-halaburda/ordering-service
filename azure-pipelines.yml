# Azure Pipelines — CI for ordering-service
# - Ruff: static lint on services/, libs/, tests/
# - Pytest: smoke (OpenAPI) + unit tests for services/ordering/domain.py (no database)
#
# Azure DevOps does not use a checked-in .env. Define the same variable names as .env.example
# under Pipeline → Variables (mark secrets). $(VAR_NAME) below forwards them to pytest if you add DB-backed tests later.

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  pythonVersion: "3.13"

steps:
  - checkout: self
    displayName: Checkout repository

  - task: UsePythonVersion@0
    inputs:
      versionSpec: $(pythonVersion)
    displayName: Use Python 3.13

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt -r requirements-dev.txt
    displayName: Install runtime and dev dependencies

  - script: |
      python -c "import sys; print(sys.version)"
      ruff --version
      pytest --version
    displayName: Print toolchain versions

  - script: |
      ruff check .
    displayName: Ruff lint

  - script: |
      pytest tests/ -q --tb=short
    displayName: Pytest (smoke + domain unit tests)
    env:
      DB_SERVER: $(DB_SERVER)
      DB_DATABASE: $(DB_DATABASE)
      DB_USERNAME: $(DB_USERNAME)
      DB_PASSWORD: $(DB_PASSWORD)
      AZURE_SQL_CONNECTION_STRING: $(AZURE_SQL_CONNECTION_STRING)
      DB_ODBC_DRIVER: $(DB_ODBC_DRIVER)
      INVENTORY_SERVICE_URL: $(INVENTORY_SERVICE_URL)
      AZURE_SERVICEBUS_SEND_CONNECTION_STRING: $(AZURE_SERVICEBUS_SEND_CONNECTION_STRING)
      AZURE_SERVICEBUS_QUEUE_NAME: $(AZURE_SERVICEBUS_QUEUE_NAME)
